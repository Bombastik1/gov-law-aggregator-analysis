<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>GovLaw Portal — Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2>🏛️ GovLaw</h2>
            <nav>
                <button onclick="loadLaws()">🔄 Оновити дані</button>
                <div class="nav-item">Реєстр актів</div>
                <div class="nav-item">Аналітика</div>
            </nav>
        </aside>
        <main class="content">
            <header class="top-bar">
                <h1>Система моніторингу законодавства</h1>
                <div class="stats-badge">Активних актів: <span id="law-count">0</span></div>
            </header>
        
            <div class="toolbar">
                <input type="text" id="search-input" placeholder="Пошук за назвою..." onkeyup="filterLaws()">
                <select id="category-filter" onchange="filterLaws()">
                    <option value="all">Всі категорії</option>
                    <option value="Закон">Закони</option>
                    <option value="Постанова">Постанови</option>
                    <option value="Кодекс">Кодекси</option>
                </select>
            </div>
        
            <div id="laws-list" class="grid">
                <!-- Картки з'являться тут -->
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
